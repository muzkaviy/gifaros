# Derleme sırasında hata veren o -Zbuild-std bayrağını ve hedefi otomatikleştirir:

[build]
target = "x86_64-unknown-none"

[unstable]
# Standart kütüphaneyi (core ve compiler_builtins) 
# panic=abort ayarıyla yeniden derlemesini söyler
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[target.x86_64-unknown-none]
# Panik stratejisini burada da garantiye alıyoruz
rustflags = ["-C", "panic=abort"]